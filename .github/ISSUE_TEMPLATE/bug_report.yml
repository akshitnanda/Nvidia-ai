name: Bug report
description: Report a bug or regression in the CLI, dashboard, docs, or workflows.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Tell us what you expected and what actually happened.
      placeholder: The command or page did X, but I expected Y.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Python version, and whether you used demo, serverless, or local_nim mode.
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant output or drag in images if helpful.
