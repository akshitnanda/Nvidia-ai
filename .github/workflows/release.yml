name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to create or update, for example v0.1.0
        required: true
      prerelease:
        description: Mark the release as a prerelease
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ inputs.tag_name }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e .[dev,docs] build

      - name: Run tests
        run: python -m pytest -q

      - name: Build distribution artifacts
        run: python -m build

      - name: Build docs bundle
        shell: bash
        run: |
          mkdir -p release-assets
          mkdocs build --strict --site-dir site
          zip -r "release-assets/nvidia-local-swarm-docs-${{ steps.meta.outputs.tag }}.zip" site
          sha256sum dist/* release-assets/* > release-assets/SHA256SUMS.txt

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          TITLE="nvidia-local-swarm ${TAG}"
          PRERELEASE_FLAG=""
          if [[ "${{ inputs.prerelease }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" dist/* release-assets/* --clobber
          else
            gh release create "${TAG}" dist/* release-assets/* \
              --title "${TITLE}" \
              --generate-notes \
              --target "${GITHUB_SHA}" \
              ${PRERELEASE_FLAG}
          fi
