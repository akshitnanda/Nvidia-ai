  <text x="592" y="109" fill="#C8D2E3" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="22" text-anchor="middle">swarm demo --mode plan</text>
  <rect x="72" y="156" width="1136" height="484" rx="20" fill="#0A0F18"/>
  <text x="108" y="214" fill="#76B900" font-family="'IBM Plex Mono', Consolas, monospace" font-size="28">$ swarm demo --mode plan --task "Show how this repo works"</text>
  <text x="108" y="272" fill="#E6EDF7" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="30">Plan generated.</text>
  <text x="108" y="328" fill="#9CB0CA" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="24">1. Objective</text>
  <text x="108" y="366" fill="#D9E2F0" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="20">Show a safe scripted walkthrough of the local swarm.</text>
  <text x="108" y="418" fill="#9CB0CA" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="24">2. Recommended Steps</text>
  <text x="132" y="456" fill="#D9E2F0" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="20">• Inspect the repo summary and recent git state.</text>
  <text x="132" y="490" fill="#D9E2F0" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="20">• Generate a concise implementation plan.</text>
  <text x="132" y="524" fill="#D9E2F0" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="20">• Preview a no-op implementation response for demos.</text>
  <rect x="856" y="214" width="296" height="184" rx="20" fill="#121C2B" stroke="#29374F"/>
  <text x="888" y="256" fill="#76B900" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="20">Why it matters</text>
  <text x="888" y="296" fill="#D9E2F0" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="18">No API key needed</text>
  <text x="888" y="328" fill="#D9E2F0" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="18">Preview-only implement flow</text>
  <text x="888" y="360" fill="#D9E2F0" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="18">Run artifacts still saved locally</text>
  <text x="108" y="604" fill="#8B9AB2" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="18">Placeholder graphic for the GitHub README. Replace with a real terminal screenshot or GIF when ready.</text>
